[object_storage_server]
bind_address = "tcp://0.0.0.0:8517"

[scheduler]
bind_address = "tcp://0.0.0.0:8516"
object_storage_address = "tcp://127.0.0.1:8517"
logging_level = "INFO"
# EC2 worker startup (Python install) can take several minutes
client_timeout_seconds = 600
worker_timeout_seconds = 600

[[worker_manager]]
type = "orb_aws_ec2"
scheduler_address = "tcp://127.0.0.1:8516"
worker_manager_id = "wm-orb"
worker_scheduler_address = "tcp://38.61.51.10:8516"
object_storage_address = "tcp://38.61.51.10:8517"
python_version = "3.14"
requirements_txt = """
opengris-scaler>=2.2.0
"""
instance_type = "t3.medium"
aws_region = "us-east-1"
logging_level = "INFO"
task_timeout_seconds = 60
