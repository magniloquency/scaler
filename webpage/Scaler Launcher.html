<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>openGRIS Scaler — EC2 Launcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="launcher-data.js"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="launcher-shared.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #080b0e; }
    body { font-family: 'JetBrains Mono', monospace; }

    @keyframes blink { 50% { opacity: 0; } }
    @keyframes fadeSlideIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes launchPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(0,255,136,0.4); } 50% { box-shadow: 0 0 0 12px rgba(0,255,136,0); } }

    input[type=number]::-webkit-inner-spin-button { opacity: 0.4; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,200,224,0.2); border-radius: 2px; }

    select option { background: #0c1219; color: #c0d4e8; }
  </style>
</head>
<body>
<div id="root" style="height:100%"></div>

<script type="text/babel">
const { useState, useCallback } = React;
const { DesignCanvas, DCSection, DCArtboard } = window;

/* ─── shared form state hook ─── */
function useFormState() {
  const [region, setRegion]               = useState("us-east-1");
  const [accessKeyId, setAccessKeyId]     = useState("");
  const [secretKey, setSecretKey]         = useState("");
  const [schedulerType, setSchedulerType] = useState("c5.xlarge");
  const [workerType, setWorkerType]       = useState("g4dn.xlarge");
  const [capMode, setCapMode]             = useState("instances"); // "instances" | "budget"
  const [instanceCap, setInstanceCap]     = useState(4);
  const [budgetCap, setBudgetCap]         = useState(10);
  const [requirements, setRequirements]   = useState("");
  const [phase, setPhase]                 = useState("idle"); // idle | launching | done
  const lines = window.FAKE_TERMINAL_LINES || [];

  const allInstances   = window.SCALER_INSTANCES || [];
  const workerInst     = allInstances.find(i => i.type === workerType)    || { vcpu: 1, price: 0 };
  const schedulerInst  = allInstances.find(i => i.type === schedulerType) || { price: 0 };

  const derivedInstanceCount = capMode === "instances"
    ? Math.max(0, instanceCap)
    : Math.max(0, Math.floor((budgetCap - schedulerInst.price) / (workerInst.price || 1)));

  const workerCount    = derivedInstanceCount * workerInst.vcpu;
  const totalCostPerHr = schedulerInst.price + derivedInstanceCount * workerInst.price;

  const launch = useCallback(() => {
    if (phase !== "idle") return;
    setPhase("launching");
    const maxT = Math.max(...lines.map(l => l.t));
    setTimeout(() => setPhase("done"), maxT + 600);
  }, [phase, lines]);

  const reset = () => setPhase("idle");

  return { region, setRegion, accessKeyId, setAccessKeyId, secretKey, setSecretKey,
           schedulerType, workerType, setWorkerType,
           capMode, setCapMode, instanceCap, setInstanceCap, budgetCap, setBudgetCap,
           derivedInstanceCount, workerCount, totalCostPerHr,
           requirements, setRequirements,
           phase, launch, reset, lines };
}

/* ══════════════════════════════════════════════════════════
   VARIANT A  ·  "Terminal Native"
   Raw CLI aesthetic. Prompt-style labels. Sharp edges.
══════════════════════════════════════════════════════════ */
function VariantA() {
  const f = useFormState();
  const regions = window.SCALER_REGIONS || [];

  const Field = ({ label, children }) => (
    <div style={{ marginBottom: 14 }}>
      <div style={{ fontSize: 10, letterSpacing: "0.1em", color: "oklch(0.72 0.18 150)", marginBottom: 5, textTransform: "uppercase" }}>{label}</div>
      {children}
    </div>
  );

  const inputStyle = {
    width: "100%", background: "transparent",
    border: "1px solid rgba(0,255,136,0.18)",
    padding: "9px 12px", color: "oklch(0.85 0.06 200)",
    fontFamily: "inherit", fontSize: 13, outline: "none",
    borderRadius: 0,
    transition: "border-color 0.15s",
  };

  return (
    <div style={{ background:"#050810", minHeight:"100%", padding:"40px 48px", color:"oklch(0.82 0.06 200)" }}>
      {/* Header */}
      <div style={{ marginBottom: 36 }}>
        <pre style={{ fontSize: 11, lineHeight: 1.3, color: "oklch(0.72 0.18 150)", userSelect: "none" }}>{
`  ___  ____  ___  ____  __    ____  ____
 / _ \\|  _ \\| __|  _ \\ \\  \\  / ___||  __|
| | | | |_) | _| | | | \\ \\/ /\\__ \\| |__
|_| |_|  __/|___||_| |_| \\__/ \\___/|____|
         |_|   SCALER  ·  EC2  ·  v2.1.4`}
        </pre>
        <div style={{ marginTop: 10, fontSize: 11, color: "oklch(0.38 0.04 220)" }}>Distributed compute deployment — Amazon Web Services</div>
      </div>

      {/* Form */}
      <div style={{ maxWidth: 680 }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 32px" }}>

          <Field label="AWS Region">
            <select value={f.region} onChange={e => f.setRegion(e.target.value)} style={{ ...inputStyle, cursor: "pointer" }}>
              {regions.map(r => <option key={r.value} value={r.value}>{r.value} — {r.label}</option>)}
            </select>
          </Field>

          <Field label="Access Key ID">
            <div style={{ ...inputStyle, display: "flex", alignItems: "center" }}>
              <SecretInput value={f.accessKeyId} onChange={f.setAccessKeyId} placeholder="AKIAIOSFODNN7EXAMPLE" />
            </div>
          </Field>

          <Field label="Worker Instance">
            <InstancePicker value={f.workerType} onChange={f.setWorkerType} label="Worker" />
          </Field>

          <Field label="Scale Limit">
            <div style={{ display:"flex", marginBottom:6, border:"1px solid rgba(0,255,136,0.2)", borderRadius:0 }}>
              {[["instances","Instance cap"],["budget","$/hr cap"]].map(([val,lbl]) => (
                <button key={val} onClick={() => f.setCapMode(val)} style={{
                  flex:1, padding:"6px 0", fontFamily:"inherit", fontSize:10, letterSpacing:"0.06em",
                  textTransform:"uppercase", cursor:"pointer", border:"none",
                  background: f.capMode===val ? "rgba(0,255,136,0.12)" : "transparent",
                  color: f.capMode===val ? "oklch(0.72 0.18 150)" : "oklch(0.42 0.04 220)",
                }}>{lbl}</button>
              ))}
            </div>
            {f.capMode === "instances" ? (
              <div style={{ ...inputStyle, display:"flex", alignItems:"center", gap:8 }}>
                <input type="number" min={1} value={f.instanceCap} onChange={e => f.setInstanceCap(Math.max(1,parseInt(e.target.value)||1))}
                  style={{ width:60, background:"transparent", border:"none", outline:"none", color:"oklch(0.88 0.08 200)", fontFamily:"inherit", fontSize:13, fontWeight:600 }} />
                <span style={{ fontSize:11, color:"oklch(0.45 0.04 220)" }}>max instances</span>
              </div>
            ) : (
              <div style={{ ...inputStyle, display:"flex", alignItems:"center", gap:8 }}>
                <span style={{ fontSize:12, color:"oklch(0.62 0.1 150)" }}>$</span>
                <input type="number" min={0} step={0.5} value={f.budgetCap} onChange={e => f.setBudgetCap(Math.max(0,parseFloat(e.target.value)||0))}
                  style={{ width:70, background:"transparent", border:"none", outline:"none", color:"oklch(0.88 0.08 200)", fontFamily:"inherit", fontSize:13, fontWeight:600 }} />
                <span style={{ fontSize:11, color:"oklch(0.45 0.04 220)" }}>max per hour</span>
              </div>
            )}
            <div style={{ marginTop:8, padding:"8px 12px", border:"1px solid rgba(0,255,136,0.15)", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <span style={{ fontSize:10, color:"oklch(0.45 0.04 220)", letterSpacing:"0.06em", textTransform:"uppercase" }}>Workers → </span>
              <span style={{ fontSize:15, fontWeight:700, color:"oklch(0.72 0.18 150)" }}>{f.workerCount} <span style={{ fontSize:11, fontWeight:400, color:"oklch(0.45 0.04 220)" }}>({f.derivedInstanceCount} × {(window.SCALER_INSTANCES||[]).find(i=>i.type===f.workerType)?.vcpu||1} vCPU)</span></span>
            </div>
          </Field>

          <Field label="Secret Access Key">
            <div style={{ ...inputStyle, display: "flex", alignItems: "center" }}>
              <SecretInput value={f.secretKey} onChange={f.setSecretKey} placeholder="wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY" />
            </div>
          </Field>

          <Field label="requirements.txt">
            <div style={{ fontFamily:"inherit", fontSize:12, background:"transparent", border:"1px solid rgba(0,255,136,0.18)", padding:"7px 10px", display:"flex", alignItems:"center", gap:8, borderBottom:"1px dashed rgba(0,255,136,0.12)" }}>
              <span style={{ color:"oklch(0.72 0.16 150)", fontWeight:600 }}>opengris-scaler[all]</span>
              <span style={{ color:"oklch(0.42 0.06 200)", fontSize:11 }}>&nbsp;# required</span>
              <span style={{ marginLeft:"auto", fontSize:9, color:"oklch(0.38 0.04 220)", letterSpacing:"0.06em", textTransform:"uppercase", userSelect:"none" }}>locked</span>
            </div>
            <textarea
              value={f.requirements}
              onChange={e => f.setRequirements(e.target.value)}
              placeholder={"numpy>=1.26\ntorch>=2.0\n# add more packages…"}
              rows={4} spellCheck={false}
              style={{ width:"100%", display:"block", background:"transparent", border:"1px solid rgba(0,255,136,0.18)", borderTop:"none", padding:"8px 10px", color:"oklch(0.82 0.06 200)", fontFamily:"inherit", fontSize:12, lineHeight:1.65, resize:"vertical", outline:"none", caretColor:"oklch(0.72 0.18 150)", borderRadius:0 }}
            />
          </Field>

        </div>

        {/* Launch */}
        <div style={{ marginTop: 28 }}>
          <button
            onClick={f.launch}
            disabled={f.phase !== "idle"}
            style={{
              width: "100%",
              padding: "18px",
              background: f.phase !== "idle" ? "rgba(0,255,136,0.05)" : "transparent",
              border: `2px solid ${f.phase !== "idle" ? "rgba(0,255,136,0.3)" : "oklch(0.72 0.18 150)"}`,
              color: f.phase !== "idle" ? "oklch(0.45 0.09 150)" : "oklch(0.72 0.18 150)",
              fontFamily: "inherit",
              fontSize: 15,
              fontWeight: 600,
              letterSpacing: "0.25em",
              cursor: f.phase !== "idle" ? "default" : "pointer",
              animation: f.phase === "idle" ? "launchPulse 3s ease-in-out infinite" : "none",
              transition: "all 0.2s",
              textTransform: "uppercase",
            }}
          >
            {f.phase === "idle" ? "▶  EXECUTE LAUNCH" : f.phase === "launching" ? "⠿  DEPLOYING..." : "✓  DEPLOYED"}
          </button>
        </div>
      </div>

      {/* Terminal + Details */}
      {f.phase !== "idle" && (
        <div style={{ marginTop: 32, maxWidth: 680, animation: "fadeSlideIn 0.3s ease" }}>
          <TerminalWindow
            lines={f.lines}
            config={{ schedulerType: f.schedulerType, workerType: f.workerType, region: f.region }}
            style={{ marginBottom: 16 }}
          />
          <DeployDetails visible={f.phase === "done"} />
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   VARIANT B  ·  "Control Panel"
   Split layout: left config rail + right output panel.
══════════════════════════════════════════════════════════ */
function VariantB() {
  const f = useFormState();
  const regions = window.SCALER_REGIONS || [];

  const Label = ({ children, help }) => (
    <div style={{ fontSize: 10, letterSpacing: "0.1em", color: "oklch(0.72 0.14 200)", marginBottom: 5, textTransform: "uppercase", display: "flex", alignItems: "center", gap: 6 }}>
      <span>{children}</span>
      {help && <HelpTip text={help} />}
    </div>
  );

  const Input = ({ style, ...props }) => (
    <input {...props} style={{
      width: "100%",
      background: "rgba(255,255,255,0.04)",
      border: "1px solid rgba(0,200,224,0.15)",
      borderRadius: 3,
      padding: "8px 10px",
      color: "oklch(0.85 0.06 200)",
      fontFamily: "inherit",
      fontSize: 12,
      outline: "none",
      ...style,
    }} />
  );

  return (
    <div style={{ display: "flex", minHeight: "100%", background: "#06090d" }}>

      {/* LEFT RAIL */}
      <div style={{ width: 380, flexShrink: 0, background: "#09101a", borderRight: "1px solid rgba(0,200,224,0.1)", padding: "32px 28px", display: "flex", flexDirection: "column" }}>

        {/* Logo */}
        <div style={{ marginBottom: 32 }}>
          <div style={{ fontSize: 11, color: "oklch(0.72 0.18 200)", letterSpacing: "0.2em", fontWeight: 700 }}>OPEN<span style={{ color: "oklch(0.72 0.18 150)" }}>GRIS</span></div>
          <div style={{ fontSize: 18, fontWeight: 700, color: "oklch(0.88 0.06 200)", letterSpacing: "0.05em", marginTop: 2 }}>SCALER</div>
          <div style={{ fontSize: 10, color: "oklch(0.58 0.05 220)", marginTop: 3, letterSpacing: "0.08em" }}>EC2 · DISTRIBUTED COMPUTE</div>
        </div>

        <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 18 }}>

          {/* Region */}
          <div>
            <Label help="The AWS region where your cluster will be deployed. Choose a region close to your data or end-users to minimize latency.">AWS Region</Label>
            <select value={f.region} onChange={e => f.setRegion(e.target.value)} style={{
              width: "100%", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(0,200,224,0.15)",
              borderRadius: 3, padding: "8px 10px", color: "oklch(0.85 0.06 200)", fontFamily: "inherit", fontSize: 12, outline: "none", cursor: "pointer",
            }}>
              {regions.map(r => <option key={r.value} value={r.value}>{r.value}</option>)}
            </select>
          </div>

          {/* Credentials */}
          <div>
            <Label help="Your IAM credentials must have permissions to create EC2 instances, VPCs, security groups, and IAM roles. We recommend a dedicated IAM user with the AmazonEC2FullAccess policy.">AWS Credentials</Label>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              <div style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(0,200,224,0.15)", borderRadius:3, padding:"8px 10px", display:"flex", alignItems:"center" }}>
                <span style={{ fontSize:10, color:"oklch(0.64 0.08 200)", marginRight:8, flexShrink:0 }}>KEY_ID</span>
                <SecretInput value={f.accessKeyId} onChange={f.setAccessKeyId} placeholder="AKIA…" style={{ flex:1, fontSize:12, color:"oklch(0.85 0.06 200)" }} />
              </div>
              <div style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(0,200,224,0.15)", borderRadius:3, padding:"8px 10px", display:"flex", alignItems:"center" }}>
                <span style={{ fontSize:10, color:"oklch(0.64 0.08 200)", marginRight:8, flexShrink:0 }}>SECRET</span>
                <SecretInput value={f.secretKey} onChange={f.setSecretKey} placeholder="wJalr…" style={{ flex:1, fontSize:12, color:"oklch(0.85 0.06 200)" }} />
              </div>
            </div>
          </div>

          {/* Instances */}
          <div>
            <Label help="Worker instance type used for all compute nodes. Choose based on your workload: compute (c5/c6i) for CPU jobs, memory (r5/r6i) for large datasets, or GPU (g4dn/g5) for ML workloads.">Worker Instance</Label>
            <InstancePicker value={f.workerType} onChange={f.setWorkerType} />
          </div>

          {/* Scale cap */}
          <div>
            <Label help="Cap cluster size by instance count or total $/hr spend. The worker count is derived automatically (1 worker per vCPU).">Scale Limit</Label>
            {/* Toggle */}
            <div style={{ display: "flex", marginBottom: 8, borderRadius: 3, overflow: "hidden", border: "1px solid rgba(0,200,224,0.2)" }}>
              {[["instances","Instance cap"],["budget","$/hr cap"]].map(([val, lbl]) => (
                <button key={val} onClick={() => f.setCapMode(val)} style={{
                  flex: 1, padding: "7px 0", fontFamily: "inherit", fontSize: 10, letterSpacing: "0.06em",
                  textTransform: "uppercase", cursor: "pointer", border: "none",
                  background: f.capMode === val ? "rgba(0,200,224,0.18)" : "transparent",
                  color: f.capMode === val ? "oklch(0.78 0.16 200)" : "oklch(0.48 0.05 220)",
                  transition: "background 0.15s, color 0.15s",
                }}>{lbl}</button>
              ))}
            </div>
            {/* Input */}
            {f.capMode === "instances" ? (
              <div style={{ display: "flex", alignItems: "center", gap: 8, background: "rgba(255,255,255,0.04)", border: "1px solid rgba(0,200,224,0.15)", borderRadius: 3, padding: "8px 10px" }}>
                <input type="number" min={1} max={1000} value={f.instanceCap}
                  onChange={e => f.setInstanceCap(Math.max(1, parseInt(e.target.value)||1))}
                  style={{ width: 60, background: "transparent", border: "none", outline: "none", color: "oklch(0.88 0.08 200)", fontFamily: "inherit", fontSize: 13, fontWeight: 600 }} />
                <span style={{ fontSize: 11, color: "oklch(0.5 0.04 220)" }}>max EC2 instances</span>
              </div>
            ) : (
              <div style={{ display: "flex", alignItems: "center", gap: 8, background: "rgba(255,255,255,0.04)", border: "1px solid rgba(0,200,224,0.15)", borderRadius: 3, padding: "8px 10px" }}>
                <span style={{ fontSize: 12, color: "oklch(0.62 0.1 150)" }}>$</span>
                <input type="number" min={0} step={0.5} value={f.budgetCap}
                  onChange={e => f.setBudgetCap(Math.max(0, parseFloat(e.target.value)||0))}
                  style={{ width: 70, background: "transparent", border: "none", outline: "none", color: "oklch(0.88 0.08 200)", fontFamily: "inherit", fontSize: 13, fontWeight: 600 }} />
                <span style={{ fontSize: 11, color: "oklch(0.5 0.04 220)" }}>max per hour</span>
              </div>
            )}
            {/* Derived output */}
            <div style={{ marginTop: 10, padding: "10px 12px", background: "rgba(0,255,136,0.04)", border: "1px solid rgba(0,255,136,0.12)", borderRadius: 3, display: "flex", flexDirection: "column", gap: 5 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                <span style={{ fontSize: 10, color: "oklch(0.55 0.04 220)", letterSpacing: "0.06em", textTransform: "uppercase" }}>Workers spawned</span>
                <span style={{ fontSize: 16, fontWeight: 700, color: "oklch(0.78 0.18 150)" }}>{f.workerCount.toLocaleString()}</span>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                <span style={{ fontSize: 10, color: "oklch(0.55 0.04 220)", letterSpacing: "0.06em", textTransform: "uppercase" }}>EC2 instances</span>
                <span style={{ fontSize: 12, color: "oklch(0.65 0.08 200)" }}>{f.derivedInstanceCount}</span>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                <span style={{ fontSize: 10, color: "oklch(0.55 0.04 220)", letterSpacing: "0.06em", textTransform: "uppercase" }}>Est. cost/hr</span>
                <span style={{ fontSize: 12, color: "oklch(0.65 0.12 150)" }}>${f.totalCostPerHr.toFixed(3)}</span>
              </div>
            </div>
          </div>

          {/* Requirements */}
          <div>
            <Label help="Python packages to install on all cluster nodes. opengris-scaler[all] is always included. Add one package per line in pip requirements format (e.g. numpy==1.26.0 or torch>=2.0).">
              requirements.txt
            </Label>
            <div style={{ fontFamily:"inherit", fontSize:12, background:"rgba(255,255,255,0.03)", border:"1px solid rgba(0,200,224,0.15)", borderRadius:"3px 3px 0 0", padding:"7px 10px", display:"flex", alignItems:"center", gap:8, borderBottom:"1px dashed rgba(0,200,224,0.1)" }}>
              <span style={{ color:"oklch(0.72 0.16 150)", fontWeight:600 }}>opengris-scaler[all]</span>
              <span style={{ color:"oklch(0.42 0.06 200)", fontSize:11 }}>&nbsp;# required</span>
              <span style={{ marginLeft:"auto", fontSize:9, color:"oklch(0.38 0.04 220)", letterSpacing:"0.06em", textTransform:"uppercase", userSelect:"none" }}>locked</span>
            </div>
            <textarea
              value={f.requirements}
              onChange={e => f.setRequirements(e.target.value)}
              placeholder={"numpy>=1.26\ntorch>=2.0\n# add more packages…"}
              rows={4}
              spellCheck={false}
              style={{
                width:"100%", display:"block",
                background:"rgba(255,255,255,0.03)",
                border:"1px solid rgba(0,200,224,0.15)",
                borderTop:"none",
                borderRadius:"0 0 3px 3px",
                padding:"8px 10px",
                color:"oklch(0.82 0.06 200)",
                fontFamily:"inherit", fontSize:12, lineHeight:1.65,
                resize:"vertical",
                outline:"none",
                caretColor:"oklch(0.72 0.18 150)",
              }}
            />
          </div>

        </div>

        {/* Launch */}
        <button
          onClick={f.launch}
          disabled={f.phase !== "idle"}
          style={{
            marginTop: 24,
            padding: "16px",
            background: f.phase !== "idle"
              ? "rgba(0,200,224,0.05)"
              : "linear-gradient(135deg, oklch(0.38 0.16 155) 0%, oklch(0.32 0.14 200) 100%)",
            border: "1px solid " + (f.phase !== "idle" ? "rgba(0,200,224,0.15)" : "oklch(0.55 0.16 155)"),
            borderRadius: 4,
            color: f.phase !== "idle" ? "oklch(0.45 0.08 200)" : "oklch(0.92 0.1 155)",
            fontFamily: "inherit",
            fontSize: 13,
            fontWeight: 700,
            letterSpacing: "0.15em",
            cursor: f.phase !== "idle" ? "default" : "pointer",
            textTransform: "uppercase",
            transition: "all 0.2s",
            animation: f.phase === "idle" ? "launchPulse 3s ease-in-out infinite" : "none",
          }}
        >
          {f.phase === "idle" ? "▶  Launch Cluster" : f.phase === "launching" ? "Deploying…" : "✓  Deployed"}
        </button>
      </div>

      {/* RIGHT PANEL */}
      <div style={{ flex: 1, padding: "32px 32px", display: "flex", flexDirection: "column", gap: 20 }}>
        {f.phase === "idle" ? (
          <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 12 }}>
            <div style={{ fontSize: 32, color: "rgba(0,200,224,0.35)" }}>◈</div>
            <div style={{ fontSize: 12, color: "oklch(0.62 0.1 200)", letterSpacing: "0.08em" }}>READY TO DEPLOY</div>
            <div style={{ fontSize: 11, color: "oklch(0.54 0.04 220)", textAlign: "center", maxWidth: 260, lineHeight: 1.7 }}>Configure your cluster on the left, then press Launch Cluster to begin deployment.</div>
          </div>
        ) : (
          <div style={{ animation: "fadeSlideIn 0.3s ease", display: "flex", flexDirection: "column", gap: 16 }}>
            <TerminalWindow
              lines={f.lines}
              config={{ schedulerType: f.schedulerType, workerType: f.workerType, region: f.region }}
            />
            <DeployDetails visible={f.phase === "done"} />
          </div>
        )}
      </div>

    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   VARIANT C  ·  "Dark Dashboard"
   Cards-based config. Wider. More visual hierarchy.
══════════════════════════════════════════════════════════ */
function VariantC() {
  const f = useFormState();
  const regions = window.SCALER_REGIONS || [];

  const Card = ({ title, accent, children, style }) => (
    <div style={{
      background: "rgba(255,255,255,0.025)",
      border: `1px solid ${accent || "rgba(255,255,255,0.08)"}`,
      borderRadius: 6,
      padding: "20px 22px",
      ...style,
    }}>
      {title && (
        <div style={{ fontSize: 10, letterSpacing: "0.12em", color: accent ? accent : "oklch(0.5 0.04 220)", marginBottom: 16, textTransform: "uppercase", fontWeight: 600 }}>
          {title}
        </div>
      )}
      {children}
    </div>
  );

  const FieldRow = ({ label, children }) => (
    <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
      <div style={{ fontSize: 11, color: "oklch(0.45 0.04 220)", letterSpacing: "0.05em" }}>{label}</div>
      {children}
    </div>
  );

  const selectStyle = {
    width: "100%",
    background: "rgba(255,255,255,0.04)",
    border: "1px solid rgba(255,255,255,0.1)",
    borderRadius: 4,
    padding: "9px 12px",
    color: "oklch(0.85 0.06 200)",
    fontFamily: "inherit",
    fontSize: 13,
    outline: "none",
    cursor: "pointer",
  };

  const credRowStyle = {
    background: "rgba(255,255,255,0.03)",
    border: "1px solid rgba(255,255,255,0.08)",
    borderRadius: 4,
    padding: "10px 14px",
    display: "flex",
    alignItems: "center",
    gap: 10,
  };

  return (
    <div style={{ background: "#070b10", minHeight: "100%", padding: "36px 44px", color: "oklch(0.82 0.06 200)" }}>

      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 28 }}>
        <div>
          <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
            <span style={{ fontSize: 20, fontWeight: 700, color: "oklch(0.88 0.06 200)", letterSpacing: "0.05em" }}>openGRIS Scaler</span>
            <span style={{ fontSize: 11, color: "oklch(0.38 0.05 220)", background: "rgba(0,200,224,0.08)", border: "1px solid rgba(0,200,224,0.15)", borderRadius: 3, padding: "2px 7px", letterSpacing: "0.06em" }}>v2.1.4</span>
          </div>
          <div style={{ fontSize: 12, color: "oklch(0.38 0.04 220)", marginTop: 4 }}>New EC2 cluster · Amazon Web Services</div>
        </div>
      </div>

      {/* Config grid */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 16, marginBottom: 20 }}>

        <Card title="Region" accent="rgba(0,200,224,0.25)">
          <select value={f.region} onChange={e => f.setRegion(e.target.value)} style={selectStyle}>
            {regions.map(r => <option key={r.value} value={r.value}>{r.value} · {r.label}</option>)}
          </select>
          <div style={{ marginTop: 10, fontSize: 11, color: "oklch(0.38 0.04 220)" }}>
            {(regions.find(r => r.value === f.region) || {}).label || ""}
          </div>
        </Card>

        <Card title="Credentials" accent="rgba(0,200,224,0.15)" style={{ gridColumn: "span 2" }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <FieldRow label="Access Key ID">
              <div style={credRowStyle}>
                <SecretInput value={f.accessKeyId} onChange={f.setAccessKeyId} placeholder="AKIAIOSFODNN7EXAMPLE" style={{ flex: 1, fontSize: 12 }} />
              </div>
            </FieldRow>
            <FieldRow label="Secret Access Key">
              <div style={credRowStyle}>
                <SecretInput value={f.secretKey} onChange={f.setSecretKey} placeholder="wJalrXUtnFEMI/K7MDENG…" style={{ flex: 1, fontSize: 12 }} />
              </div>
            </FieldRow>
          </div>
        </Card>

        <Card title="Worker Instances" accent="rgba(0,255,136,0.15)">
          <InstancePicker value={f.workerType} onChange={f.setWorkerType} />
          <div style={{ marginTop: 10, fontSize: 11, color: "oklch(0.38 0.04 220)" }}>Compute nodes for job execution</div>
        </Card>

        <Card title="Scale Limit" accent="rgba(0,200,224,0.2)">
          <div style={{ display:"flex", marginBottom:10, borderRadius:3, overflow:"hidden", border:"1px solid rgba(0,200,224,0.2)" }}>
            {[["instances","Instance cap"],["budget","$/hr cap"]].map(([val,lbl]) => (
              <button key={val} onClick={() => f.setCapMode(val)} style={{
                flex:1, padding:"7px 0", fontFamily:"inherit", fontSize:10, letterSpacing:"0.06em",
                textTransform:"uppercase", cursor:"pointer", border:"none",
                background: f.capMode===val ? "rgba(0,200,224,0.15)" : "transparent",
                color: f.capMode===val ? "oklch(0.78 0.16 200)" : "oklch(0.48 0.05 220)",
                transition:"background 0.15s, color 0.15s",
              }}>{lbl}</button>
            ))}
          </div>
          {f.capMode === "instances" ? (
            <div style={{ display:"flex", alignItems:"center", gap:8, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:4, padding:"8px 12px" }}>
              <input type="number" min={1} value={f.instanceCap} onChange={e => f.setInstanceCap(Math.max(1,parseInt(e.target.value)||1))}
                style={{ width:60, background:"transparent", border:"none", outline:"none", color:"oklch(0.88 0.08 200)", fontFamily:"inherit", fontSize:14, fontWeight:600 }} />
              <span style={{ fontSize:11, color:"oklch(0.5 0.04 220)" }}>max EC2 instances</span>
            </div>
          ) : (
            <div style={{ display:"flex", alignItems:"center", gap:8, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:4, padding:"8px 12px" }}>
              <span style={{ fontSize:12, color:"oklch(0.62 0.1 150)" }}>$</span>
              <input type="number" min={0} step={0.5} value={f.budgetCap} onChange={e => f.setBudgetCap(Math.max(0,parseFloat(e.target.value)||0))}
                style={{ width:70, background:"transparent", border:"none", outline:"none", color:"oklch(0.88 0.08 200)", fontFamily:"inherit", fontSize:14, fontWeight:600 }} />
              <span style={{ fontSize:11, color:"oklch(0.5 0.04 220)" }}>max per hour</span>
            </div>
          )}
          <div style={{ marginTop:10, padding:"10px 12px", background:"rgba(0,255,136,0.04)", border:"1px solid rgba(0,255,136,0.12)", borderRadius:3, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div style={{ display:"flex", flexDirection:"column", gap:3 }}>
              <span style={{ fontSize:10, color:"oklch(0.55 0.04 220)", letterSpacing:"0.06em", textTransform:"uppercase" }}>Workers spawned</span>
              <span style={{ fontSize:10, color:"oklch(0.5 0.04 220)" }}>{f.derivedInstanceCount} instances × {(window.SCALER_INSTANCES||[]).find(i=>i.type===f.workerType)?.vcpu||1} vCPU · ${f.totalCostPerHr.toFixed(3)}/hr</span>
            </div>
            <span style={{ fontSize:22, fontWeight:700, color:"oklch(0.78 0.18 150)" }}>{f.workerCount.toLocaleString()}</span>
          </div>
        </Card>

        {/* Requirements card */}
        <Card title="requirements.txt" accent="rgba(0,200,224,0.15)" style={{ gridColumn: "span 2" }}>
          <div style={{ fontFamily:"inherit", fontSize:12, background:"rgba(255,255,255,0.03)", border:"1px solid rgba(0,255,136,0.18)", borderRadius:"3px 3px 0 0", padding:"7px 10px", display:"flex", alignItems:"center", gap:8, borderBottom:"1px dashed rgba(0,255,136,0.12)" }}>
            <span style={{ color:"oklch(0.72 0.16 150)", fontWeight:600 }}>opengris-scaler[all]</span>
            <span style={{ color:"oklch(0.42 0.06 200)", fontSize:11 }}>&nbsp;# required</span>
            <span style={{ marginLeft:"auto", fontSize:9, color:"oklch(0.38 0.04 220)", letterSpacing:"0.06em", textTransform:"uppercase", userSelect:"none" }}>locked</span>
          </div>
          <textarea
            value={f.requirements}
            onChange={e => f.setRequirements(e.target.value)}
            placeholder={"numpy>=1.26\ntorch>=2.0\n# add more packages…"}
            rows={3} spellCheck={false}
            style={{ width:"100%", display:"block", background:"rgba(255,255,255,0.03)", border:"1px solid rgba(0,255,136,0.18)", borderTop:"none", borderRadius:"0 0 3px 3px", padding:"8px 10px", color:"oklch(0.82 0.06 200)", fontFamily:"inherit", fontSize:12, lineHeight:1.65, resize:"vertical", outline:"none", caretColor:"oklch(0.72 0.18 150)" }}
          />
        </Card>

        {/* Launch card */}
        <div style={{
          borderRadius: 6,
          padding: "20px 22px",
          background: f.phase === "idle"
            ? "linear-gradient(145deg, oklch(0.22 0.12 155) 0%, oklch(0.18 0.1 200) 100%)"
            : "rgba(0,200,224,0.04)",
          border: `1px solid ${f.phase === "idle" ? "oklch(0.45 0.15 155)" : "rgba(0,200,224,0.15)"}`,
          display: "flex",
          flexDirection: "column",
          justifyContent: "space-between",
          gap: 16,
        }}>
          <div>
            <div style={{ fontSize: 10, letterSpacing: "0.12em", color: f.phase === "idle" ? "oklch(0.65 0.2 155)" : "oklch(0.45 0.08 200)", marginBottom: 8, textTransform: "uppercase" }}>
              {f.phase === "idle" ? "Ready" : f.phase === "launching" ? "Deploying" : "Complete"}
            </div>
            <div style={{ fontSize: 12, color: f.phase === "idle" ? "oklch(0.65 0.12 155)" : "oklch(0.4 0.05 220)", lineHeight: 1.6 }}>
              {f.phase === "idle"
                ? "All configuration set. Click to launch your cluster on AWS."
                : f.phase === "launching"
                ? "Cluster deployment in progress…"
                : "Cluster is live and ready for jobs."}
            </div>
          </div>
          <button
            onClick={f.launch}
            disabled={f.phase !== "idle"}
            style={{
              padding: "14px",
              background: f.phase !== "idle" ? "transparent" : "oklch(0.68 0.2 155)",
              border: f.phase !== "idle" ? "1px solid rgba(0,200,224,0.15)" : "none",
              borderRadius: 4,
              color: f.phase !== "idle" ? "oklch(0.45 0.08 200)" : "#050810",
              fontFamily: "inherit",
              fontSize: 13,
              fontWeight: 700,
              letterSpacing: "0.12em",
              cursor: f.phase !== "idle" ? "default" : "pointer",
              textTransform: "uppercase",
              animation: f.phase === "idle" ? "launchPulse 3s ease-in-out infinite" : "none",
            }}
          >
            {f.phase === "idle" ? "▶  Launch Cluster" : f.phase === "launching" ? "⠿  Deploying…" : "✓  Deployed"}
          </button>
        </div>

      </div>

      {/* Terminal + Details */}
      {f.phase !== "idle" && (
        <div style={{ animation: "fadeSlideIn 0.3s ease", display: "flex", flexDirection: "column", gap: 16 }}>
          <TerminalWindow
            lines={f.lines}
            config={{ schedulerType: f.schedulerType, workerType: f.workerType, region: f.region }}
          />
          <DeployDetails visible={f.phase === "done"} />
        </div>
      )}

    </div>
  );
}

/* ─── Root ─── */
function App() {
  return (
    <DesignCanvas background="#080b0e">
      <DCSection id="A" title="A · Terminal Native">
        <DCArtboard id="A1" label="Raw CLI aesthetic" width={800} height={1400}>
          <VariantA />
        </DCArtboard>
      </DCSection>
      <DCSection id="B" title="B · Control Panel">
        <DCArtboard id="B1" label="Split: config rail + output" width={1100} height={1400}>
          <VariantB />
        </DCArtboard>
      </DCSection>
      <DCSection id="C" title="C · Dark Dashboard">
        <DCArtboard id="C1" label="Card-based, wide layout" width={1200} height={1400}>
          <VariantC />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
