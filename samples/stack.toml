# Scaler stack configuration for the order_flow_ray pipeline.
#
# Replace EC2_PUBLIC_IP and EC2_PRIVATE_IP with the values from `aws ec2 describe-instances`.
# Deploy this file to the EC2 host and start with: scaler stack.toml
#
# Workers install the pipeline package from S3 at startup. Build and upload it first:
#
#   cd samples/order_flow_ray/samples/order_flow_ray
#   pip install build
#   python -m build --sdist
#   aws s3 cp dist/order_flow_ray-0.1.0.tar.gz s3://<your-bucket>/packages/
#
# Then update the requirements_txt below with the correct S3 URL.

[object_storage_server]
bind_address = "tcp://0.0.0.0:6789"

[scheduler]
bind_address = "tcp://0.0.0.0:6788"
object_storage_address = "tcp://127.0.0.1:6789"
advertised_object_storage_address = "tcp://EC2_PUBLIC_IP:6789"

[[worker_manager]]
type = "orb_aws_ec2"
scheduler_address = "tcp://127.0.0.1:6788"
worker_manager_id = "wm-orb"
worker_scheduler_address = "tcp://EC2_PRIVATE_IP:6788"
object_storage_address = "tcp://EC2_PRIVATE_IP:6789"
python_version = "3.13"
requirements_txt = """
opengris-scaler>=1.27.0
polars
boto3
botocore
pyarrow
order_flow_ray @ https://s3.<region>.amazonaws.com/<your-bucket>/packages/order_flow_ray-0.1.0.tar.gz
"""
instance_type = "t3.medium"
aws_region = "us-east-1"
logging_level = "INFO"
